schema_version: 1

context:
  version: "0.4.1"

package:
  name: hf-gradio
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/h/hf_gradio/hf_gradio-${{ version }}.tar.gz
  sha256: a017d942618f0d495a58ee4563047fa04bef614c00e0cb789a9a6d0633cffa7b

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - hf-gradio = hf_gradio.cli:app

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - typer
    - gradio-client >=2.0,<3.0

tests:
  - python:
      imports:
        - hf_gradio
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - hf-gradio --help

about:
  summary: An extension of the Hugging Face CLI for interacting with Gradio Spaces and Apps.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/gradio-app/hf-gradio

extra:
  recipe-maintainers:
    - flferretti
    - freddyaboulton
